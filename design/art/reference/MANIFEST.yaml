# MANIFEST.yaml — Reference image manifest for Sight Lines art direction
# Version: 1.0  KAMA-44
#
# This file catalogues all images in design/art/reference/.
# Statuses:
#   approved    — reviewed and signed off by Art Director; use for VLM rubric
#   placeholder — not yet captured; VLM rubric items referencing this file
#                 must be skipped until status is updated to "approved"
#   deprecated  — replaced by a newer image; do not use for new checks
#
# Fields per entry:
#   filename    — path relative to design/art/reference/
#   status      — approved | placeholder | deprecated
#   description — what this image shows and what it is authoritative for
#   captured_by — agent or human who captured/created this
#   date        — ISO 8601 date of capture / approval
#   rubric_ids  — which rubric.yaml item IDs this image supports as context
#   notes       — additional context

_meta:
  game: Sight Lines
  version: "1.0"
  authored: KAMA-44

images:

  # ── Palette reference swatches ────────────────────────────────────────────────
  #
  # These are to be programmatically generated PNG swatches from palette.json,
  # one swatch per palette role, 200×200 px solid fill.
  # Status: placeholder — awaiting Technical Artist (verify_art_direction.py)
  # or QA Tester generation pass.

  - filename: "palette_swatches.png"
    status: placeholder
    description: >
      200×200 px solid-fill swatches for all 13 palette roles, arranged in a
      grid. Generated from palette.json hex values. Used as ground truth for
      delta-E calibration in the verification pipeline.
    captured_by: null
    date: null
    rubric_ids: []
    notes: >
      To be generated by scripts/verify_art_direction.py. Once generated and
      reviewed, set status to "approved".

  # ── Gameplay screenshots ──────────────────────────────────────────────────────
  #
  # Golden captures live in golden_captures/ (populated by QA Tester follow-up).
  # These reference/ images are conceptual / wireframe references, not golden
  # pixel captures.

  - filename: "gameplay_idle_level01.png"
    status: placeholder
    description: >
      Screenshot of Level 1 in idle state: level loaded, no pieces placed,
      no ray visible. Authoritative for: background color, slot tile color,
      wall tile color, target tile unlit color, grid layout.
    captured_by: null
    date: null
    rubric_ids: [R-TGT-01, R-SHAPE-01, R-LAYOUT-01, R-LAYOUT-02, R-OVERALL-01, R-OVERALL-02]
    notes: >
      Capture using xvfb-run + write-movie method (see project_visual_validation.md memory).
      Headless render on host 192.168.0.30 (Godot 4.6.2).

  - filename: "gameplay_ray_active.png"
    status: placeholder
    description: >
      Screenshot of a level mid-solve: at least one observer placed, ray
      visible, at least one target lit and one unlit. Authoritative for: ray
      beam appearance, lit/unlit target contrast, observer color.
    captured_by: null
    date: null
    rubric_ids: [R-RAY-01, R-RAY-02, R-TGT-01, R-TGT-02, R-SHAPE-02, R-WIN-01, R-OVERALL-01]
    notes: >
      Requires a scripted playback or test scenario to produce a deterministic
      ray path. Use level_01 with known solution moves.

  - filename: "gameplay_win_state.png"
    status: placeholder
    description: >
      Screenshot immediately after win condition achieved: all targets lit,
      win pulse animation active. Authoritative for: win pulse visual,
      win state green (#38FF73) presence check.
    captured_by: null
    date: null
    rubric_ids: [R-WIN-02]
    notes: >
      Capture at the moment win_pulse = 1.0. The pulse is time-based so
      capture within 1–2 frames of win signal.

  - filename: "main_menu.png"
    status: placeholder
    description: >
      Main menu screen. Authoritative for: overall aesthetic, absence of
      win-state green.
    captured_by: null
    date: null
    rubric_ids: [R-WIN-01, R-OVERALL-01]
    notes: null

  - filename: "level_complete_overlay.png"
    status: placeholder
    description: >
      Level complete overlay over the solved puzzle. Authoritative for:
      win state green presence, level complete visual.
    captured_by: null
    date: null
    rubric_ids: [R-WIN-02]
    notes: null
