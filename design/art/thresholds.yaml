# thresholds.yaml — Numeric verification tolerances for Sight Lines art QA
# Version: 2.0  KAMA-66
# Supersedes v1.0 (KAMA-44). Key corrections:
#   - Resolution baseline corrected to 760×580 (was 1280×720)
#   - PAD_Y minimum corrected to 40 px (was 50 px; code enforces maxf(..., 40.0))
#   - Maximum grid dimensions updated for 760×580 viewport
#   - avoid_target state contrast added
#   - overlay/affordance alpha checks added
# All values are Band 1 (numerical) or Band 2 (structural) — auto-testable.
# Band 3/4 rules are in rubric.yaml. Do not add Band 3/4 items here.
#
# Coordinate and size conventions:
#   - Resolution baseline: 760 × 580 px  (project.godot viewport_width/height)
#   - Cell size: 80 × 80 px (CELL constant in Game.gd)
#   - PAD_X: (760 - COLS×80) / 2  — guaranteed ≥ 40 px on shipped levels
#   - PAD_Y: max((580 - ROWS×80) / 2 - 20, 40)  — minimum enforced at 40 px

_meta:
  game: Sight Lines
  version: "2.0"
  authored: KAMA-66
  resolution_baseline_px: [760, 580]
  cell_size_px: 80

# ── Band 1: Color / Numerical ─────────────────────────────────────────────────

color:
  delta_e_metric: CIEDE2000
  # See palette.json for per-role delta_e_tolerance values.
  # The entries below are ADDITIONAL threshold checks beyond per-swatch matching.

  wcag_contrast:
    # Minimum contrast ratio (luminance-based, per WCAG 2.1).
    ui_text_on_background:
      foreground_hex: "#9499B3"
      background_hex: "#14171F"
      minimum_ratio: 4.5
      standard: "WCAG AA"
    title_text_on_background:
      foreground_hex: "#B3B8D1"
      background_hex: "#14171F"
      minimum_ratio: 4.5
      standard: "WCAG AA"

  minimum_delta_e_between_states:
    target_unlit_vs_lit:
      a_hex: "#7A3333"
      b_hex: "#FF991A"
      minimum: 30
      reason: "State change must be unambiguous — core win-condition signal"
    avoid_target_unlit_vs_lit:
      a_hex: "#1A8C99"
      b_hex: "#F22626"
      minimum: 40
      reason: "Avoid-target state change must be strongly alarming"
    wall_vs_background:
      a_hex: "#383B45"
      b_hex: "#14171F"
      minimum: 12
      reason: "Walls must be legible against the background"
    observer_vs_ray:
      a_hex: "#61B3FF"
      b_hex: "#6BD6FF"
      minimum: 5
      reason: "Observer piece must not visually fuse with the ray beam"
    overlay_card_vs_background:
      a_hex: "#1A1F29"
      b_hex: "#14171F"
      minimum: 6
      reason: "Overlay card must be distinct from gameplay background"

  hover_overlay_alpha:
    # Alpha values for affordance overlays, checked on the raw draw() output.
    valid_hover:
      expected_alpha: 0.13
      tolerance: 0.05
      color_rgb: [1.0, 1.0, 1.0]
    invalid_hover:
      expected_alpha: 0.08
      tolerance: 0.05
      color_rgb: [1.0, 0.30, 0.30]
    idle_affordance:
      expected_alpha: 0.28
      tolerance: 0.05
      color_rgb: [1.0, 1.0, 1.0]
    reject_flash_peak:
      expected_alpha: 0.55
      tolerance: 0.05
      color_rgb: [1.0, 0.15, 0.15]
    ghost_piece:
      expected_alpha: 0.40
      tolerance: 0.05
      color_rgb: null   # alpha applied to the piece's own color
    slot_dashed_border:
      expected_alpha: 0.80
      tolerance: 0.05
      color_rgb: [0.28, 0.32, 0.40]
    overlay_scrim:
      expected_alpha: 0.72
      tolerance: 0.05
      color_rgb: [0.0, 0.0, 0.0]
      applies_to_scenes: [pause_menu, level_complete]

# ── Band 2: Structural / Layout ───────────────────────────────────────────────

layout:
  viewport_px: [760, 580]

  grid:
    # Grid must not clip the viewport on any shipped level (levels 1–12).
    # PAD_X = (760 - COLS×80)/2; PAD_Y = max((580 - ROWS×80)/2 - 20, 40)
    minimum_pad_x_px: 40
    minimum_pad_y_px: 40    # Code enforces maxf(..., 40.0) — not 50
    # No grid element may extend beyond these viewport margins.
    maximum_grid_width_px: 680    # 760 - 2×40
    maximum_grid_height_px: 500   # 580 - 2×40

  cell:
    size_px: 80
    size_tolerance_px: 2   # allow 1px rounding on either side

elements:
  observer_circle:
    # Observer icon: filled circle (r = 0.26 × cell) + hollow inner (0.44×r) + pointer.
    # Circle radius = 0.26 × 80 = 20.8 px; check 18–24 px.
    radius_min_px: 18
    radius_max_px: 24
    # Pointer tip: r × 1.6 = 20.8 × 1.6 ≈ 33 px from center.
    pointer_tip_min_px_from_center: 28
    pointer_tip_max_px_from_center: 40

  mirror_stroke:
    # Mirror diagonal stroke: 0.16 × cell margin = 12.8 px inset per side.
    margin_min_px: 10
    margin_max_px: 18
    stroke_weight_min_px: 3
    stroke_weight_nominal_px: 4

  target_diamond:
    # Target tile: L1 diamond shape.
    # diamond_size_uv = 0.26; in pixels = 0.26 × 40 (half-cell) ≈ 10.4 px from centre.
    diamond_size_uv: 0.26
    diamond_size_tolerance_uv: 0.04
    glow_ring_visible_when_lit: true

  ray_beam:
    # Ray is a Line2D with width = 28 px.
    # Bounding box height of the beam (including glow halo) must be in range.
    beam_width_min_px: 24
    beam_width_max_px: 32
    # Terminal fade: opacity must reach ≤ 0.05 at UV.x = 1.0 (ray endpoint).
    terminal_alpha_max: 0.05

animation:
  rejection_flash:
    duration_min_sec: 0.18
    duration_max_sec: 0.26
    # Flash must be fully transparent (alpha ≤ 0.02) after duration_max_sec.
    post_duration_alpha_max: 0.02

  win_pulse:
    # Level-complete overlay: outer glow oscillates at ~2.4 rad/s; border at ~2.0 rad/s.
    # Not a discrete frequency — check that the animation is visibly cycling.
    _note: "Band 3 holistic check R-WIN-02 governs this; no numeric floor here."

  ray_update_latency:
    # After any piece placement / removal, ray visuals must update within 1 frame.
    # At 60 fps this is ≤ 17 ms. Aspirational — covered by Band 4 in art-bible.md.
    _note: "Band 4 — not auto-tested here"

ui_overlap:
  # UI elements (title, piece inventory, controls) must not overlap the grid rect.
  # Grid rect origin = (PAD_X, PAD_Y); size = (COLS × 80, ROWS × 80).
  ui_must_not_overlap_grid: true

similarity:
  # Structural similarity (SSIM) floors for screenshot regression testing.
  # These apply when comparing a captured screenshot to an approved golden capture.
  # Used by the verification pipeline (Technical Artist follow-up).
  golden_ssim_floor: 0.90
  palette_region_ssim_floor: 0.85
